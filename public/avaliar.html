<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avaliar Atendimento - JS AutoCar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚗</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ── Layout ── */
    html, body { min-height: 100vh; }
    .avaliar-main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
      min-height: calc(100vh - 80px);
    }

    /* ── Card ── */
    .avaliar-card {
      background: var(--bg-card, #060f1e);
      border: 1px solid rgba(0,170,255,.18);
      border-radius: 16px;
      box-shadow: 0 8px 48px rgba(0,0,0,.5), 0 0 0 1px rgba(0,170,255,.06);
      padding: 2.5rem 2rem;
      max-width: 500px;
      width: 100%;
    }

    .avaliar-card h1 {
      font-size: clamp(1.4rem, 4vw, 1.8rem);
      font-weight: 800;
      color: var(--text-white, #fff);
      margin-bottom: .4rem;
    }

    .avaliar-card .subtitle {
      color: var(--text-muted, #b8c7d9);
      margin-bottom: 2rem;
      font-size: .95rem;
    }

    /* ── Form fields override for this page ── */
    .avaliar-card .form-group label {
      color: var(--text-muted, #b8c7d9);
      font-weight: 500;
      font-size: .9rem;
      display: block;
      margin-bottom: .4rem;
    }

    .avaliar-card input[type="text"],
    .avaliar-card textarea {
      width: 100%;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(0,170,255,.2);
      border-radius: 8px;
      color: var(--text-white, #fff);
      padding: .75rem 1rem;
      font-family: inherit;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color .2s;
      outline: none;
    }

    .avaliar-card input[type="text"]::placeholder,
    .avaliar-card textarea::placeholder {
      color: rgba(184,199,217,.4);
    }

    .avaliar-card input[type="text"]:focus,
    .avaliar-card textarea:focus {
      border-color: var(--blue-neon, #00aaff);
      box-shadow: 0 0 0 3px rgba(0,170,255,.12);
    }

    .avaliar-card textarea {
      resize: vertical;
      min-height: 110px;
    }

    /* ── Stars ── */
    .stars-input {
      display: flex;
      gap: .35rem;
      margin: .25rem 0 .25rem;
    }

    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: clamp(2rem, 8vw, 2.6rem);
      line-height: 1;
      padding: .1rem;
      transition: transform .12s, color .12s;
      color: rgba(184,199,217,.25);
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .star-btn:hover,
    .star-btn.active {
      color: #f59e0b;
      transform: scale(1.15);
    }

    /* ── Success state ── */
    .success-msg {
      text-align: center;
      padding: 2rem 0;
    }

    .success-msg .big-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      display: block;
    }

    .success-msg h2 {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text-white, #fff);
      margin-bottom: .5rem;
    }

    .success-msg p {
      color: var(--text-muted, #b8c7d9);
      margin-bottom: 1.75rem;
    }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .avaliar-card {
        padding: 1.75rem 1.25rem;
        border-radius: 12px;
      }

      .star-btn {
        min-width: 48px;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="container header-inner">
    <a href="/" class="logo">
      <img src="logo.png" alt="JS AutoCar" class="logo-img" />
    </a>
  </div>
</header>

<div id="toastContainer" class="toast-container"></div>

<main class="avaliar-main">
  <div class="avaliar-card">

    <div id="formSection">
      <h1>⭐ Avaliar atendimento</h1>
      <p class="subtitle">Sua opinião nos ajuda a melhorar cada vez mais!</p>

      <form id="avaliarForm" onsubmit="enviarAvaliacao(event)">

        <div class="form-group" style="margin-bottom:1.25rem">
          <label for="aNome">Seu nome *</label>
          <input type="text" id="aNome" placeholder="Como quer ser identificado?" required />
        </div>

        <div class="form-group" style="margin-bottom:1.25rem">
          <label>Sua nota *</label>
          <div class="stars-input" id="starsInput" role="group" aria-label="Selecione sua nota">
            <button type="button" class="star-btn" data-v="1" onclick="setStar(1)" aria-label="1 estrela">★</button>
            <button type="button" class="star-btn" data-v="2" onclick="setStar(2)" aria-label="2 estrelas">★</button>
            <button type="button" class="star-btn" data-v="3" onclick="setStar(3)" aria-label="3 estrelas">★</button>
            <button type="button" class="star-btn" data-v="4" onclick="setStar(4)" aria-label="4 estrelas">★</button>
            <button type="button" class="star-btn" data-v="5" onclick="setStar(5)" aria-label="5 estrelas">★</button>
          </div>
          <input type="hidden" id="aNota" />
        </div>

        <div class="form-group" style="margin-bottom:1.75rem">
          <label for="aComentario">Comentário <span style="font-weight:400;opacity:.6">(opcional)</span></label>
          <textarea id="aComentario" placeholder="Conte como foi sua experiência..."></textarea>
        </div>

        <button type="submit" class="btn btn-primary btn-lg" id="btnEnviar" style="width:100%;justify-content:center">
          Enviar avaliação
        </button>

      </form>
    </div>

    <div id="successSection" style="display:none" class="success-msg">
      <span class="big-icon">🎉</span>
      <h2>Obrigado pela avaliação!</h2>
      <p>Seu comentário foi registrado com sucesso. Valorizamos muito sua opinião!</p>
      <a href="/" class="btn btn-primary" style="display:inline-flex">← Voltar ao início</a>
    </div>

  </div>
</main>

<script>
let nota = 0;

function setStar(v) {
  nota = v;
  document.getElementById('aNota').value = v;
  document.querySelectorAll('.star-btn').forEach((b, i) => {
    b.classList.toggle('active', i < v);
  });
}

function showToast(msg, type = 'success') {
  const ct = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<span>${type === 'error' ? '✗' : type === 'warning' ? '!' : '✓'}</span><span>${msg}</span>`;
  ct.appendChild(t);
  setTimeout(() => { t.classList.add('hide'); setTimeout(() => t.remove(), 300); }, 4000);
}

function enviarAvaliacao(e) {
  e.preventDefault();
  if (!nota) { showToast('Selecione uma nota.', 'warning'); return; }

  const nome = document.getElementById('aNome').value.trim();
  if (!nome) { showToast('Informe seu nome.', 'warning'); return; }

  const btn = document.getElementById('btnEnviar');
  btn.disabled = true;
  btn.textContent = 'Salvando...';

  try {
    const review = {
      nome,
      nota,
      comentario: document.getElementById('aComentario').value.trim(),
      data: new Date().toLocaleDateString('pt-BR')
    };

    const stored = JSON.parse(localStorage.getItem('reviews') || '[]');
    stored.unshift(review);
    localStorage.setItem('reviews', JSON.stringify(stored));

    document.getElementById('formSection').style.display = 'none';
    document.getElementById('successSection').style.display = '';
  } catch {
    showToast('Erro ao salvar avaliação. Tente novamente.', 'error');
    btn.disabled = false;
    btn.textContent = 'Enviar avaliação';
  }
}
</script>
</body>
</html>
