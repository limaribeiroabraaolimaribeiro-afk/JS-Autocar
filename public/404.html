<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Página não encontrada | JS AutoCar</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; padding: 2rem; }
    .icon { font-size: 5rem; margin-bottom: 1rem; }
    h1 { font-size: 6rem; font-weight: 800; color: #0066ff; line-height: 1; margin-bottom: .5rem; }
    h2 { font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; }
    p { color: rgba(255,255,255,.6); margin-bottom: 2rem; }
    a { display: inline-block; background: #0066ff; color: #fff; padding: .8rem 2rem; border-radius: 8px; font-weight: 600; text-decoration: none; transition: .2s; }
    a:hover { background: #0052cc; transform: translateY(-2px); }
  </style>
</head>
<body>
  <div>
    <div class="icon">🚗</div>
    <h1>404</h1>
    <h2>Página não encontrada</h2>
    <p>A página que você procura não existe ou foi movida.</p>
    <a href="/">Voltar ao início</a>
  </div>
</body>
</html>
