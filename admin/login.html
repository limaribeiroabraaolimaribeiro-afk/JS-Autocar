<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - JS AutoCar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔧</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Poppins', sans-serif;
      background: #0a0a0a;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .login-wrap {
      background: #111827; border-radius: 16px;
      box-shadow: 0 24px 80px rgba(0,0,0,.6);
      padding: 3rem 2.5rem; width: 100%; max-width: 420px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .brand { display: flex; align-items: center; gap: .75rem; margin-bottom: 2.5rem; }
    .brand-icon {
      width: 48px; height: 48px; background: #0066ff; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
    }
    .brand-name { font-size: 1.4rem; font-weight: 800; color: #fff; }
    .brand-name span { color: #1e90ff; }
    .brand-sub { font-size: .75rem; color: rgba(255,255,255,.4); }
    h2 { font-size: 1.4rem; font-weight: 700; color: #fff; margin-bottom: .4rem; }
    p.sub { font-size: .875rem; color: rgba(255,255,255,.5); margin-bottom: 2rem; }
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-size: .8rem; font-weight: 600; color: rgba(255,255,255,.7); margin-bottom: .4rem; }
    input {
      width: 100%; padding: .8rem 1rem; border-radius: 8px;
      border: 1.5px solid rgba(255,255,255,.1); background: rgba(255,255,255,.05);
      color: #fff; font-family: inherit; font-size: 1rem; outline: none;
      transition: border-color .2s;
    }
    input:focus { border-color: #0066ff; }
    .btn-login {
      width: 100%; padding: .9rem; background: #0066ff; color: #fff;
      border: none; border-radius: 8px; font-family: inherit;
      font-size: 1rem; font-weight: 700; cursor: pointer; transition: .2s;
      margin-top: .5rem;
    }
    .btn-login:hover { background: #0052cc; }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; }
    .error-msg {
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      color: #fca5a5; padding: .75rem 1rem; border-radius: 8px;
      font-size: .875rem; margin-bottom: 1rem; display: none;
    }
    .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: .8rem; color: rgba(255,255,255,.4); }
    .back-link a { color: #1e90ff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="brand">
      <div class="brand-icon">🚗</div>
      <div>
        <div class="brand-name">JS <span>AutoCar</span></div>
        <div class="brand-sub">Painel administrativo</div>
      </div>
    </div>

    <h2>Entrar</h2>
    <p class="sub">Acesso restrito à equipe JS AutoCar</p>

    <div class="error-msg" id="errorMsg"></div>

    <form onsubmit="doLogin(event)">
      <div class="form-group">
        <label>Usuário</label>
        <input type="text" id="usuario" placeholder="admin" required autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn-login" id="btnLogin">Entrar</button>
    </form>

    <div class="back-link"><a href="/">← Voltar ao site</a></div>
  </div>

  <script>
    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errorMsg');
      err.style.display = 'none';
      btn.disabled = true; btn.textContent = 'Entrando...';

      try {
        const r = await fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            usuario: document.getElementById('usuario').value,
            senha: document.getElementById('senha').value
          })
        });
        const data = await r.json();
        if (!r.ok) throw new Error(data.error);
        window.location.href = '/admin/dashboard';
      } catch (ex) {
        err.textContent = ex.message || 'Erro ao fazer login.';
        err.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Entrar';
      }
    }
  </script>
</body>
</html>
